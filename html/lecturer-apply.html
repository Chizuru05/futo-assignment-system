<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUTO · Lecturer Application</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="lecturer-apply.css" />
</head>
<body>
    <div class="apply-container">
        <div class="apply-card">
            <a href="index.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i>
                Back to Home
            </a>

            <div class="logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>FUTO</span>
            </div>

            <div class="apply-header">
                <h1>Apply as Lecturer</h1>
                <p>Join our academic team at Federal University of Technology, Owerri</p>
            </div>

            <form id="applyForm" class="apply-form">
                <div class="form-section">
                    <h2><i class="fa-solid fa-user"></i> Personal Information</h2>
                    
                    <div class="form-group">
                        <label for="fullName">Full Name *</label>
                        <input type="text" id="fullName" placeholder="Dr. John Doe" required />
                        <div class="error-message" id="fullNameError"></div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" placeholder="john.doe@futo.edu.ng" required />
                        <div class="error-message" id="emailError"></div>
                    </div>

                    <div class="form-group">
                        <label for="staffId">Staff ID *</label>
                        <input type="text" id="staffId" placeholder="STAFF/2024/001" required />
                        <div class="error-message" id="staffIdError"></div>
                    </div>

                    <div class="form-group">
                        <label for="department">Department *</label>
                        <select id="department" required>
                            <option value="">Select Department</option>
                            <option value="Information Technology">Information Technology</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Software Engineering">Software Engineering</option>
                            <option value="Data Science">Data Science</option>
                            <option value="Cyber Security">Cyber Security</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Physics">Physics</option>
                        </select>
                        <div class="error-message" id="departmentError"></div>
                    </div>

                    <div class="form-group">
                        <label for="rank">Academic Rank *</label>
                        <select id="rank" required>
                            <option value="">Select Rank</option>
                            <option value="Professor">Professor</option>
                            <option value="Associate Professor">Associate Professor</option>
                            <option value="Senior Lecturer">Senior Lecturer</option>
                            <option value="Lecturer I">Lecturer I</option>
                            <option value="Lecturer II">Lecturer II</option>
                            <option value="Assistant Lecturer">Assistant Lecturer</option>
                        </select>
                        <div class="error-message" id="rankError"></div>
                    </div>

                    <div class="form-group">
                        <label for="specialization">Area of Specialization</label>
                        <input type="text" id="specialization" placeholder="e.g., Artificial Intelligence, Data Science" />
                    </div>
                </div>

                <div class="form-section">
                    <h2><i class="fa-solid fa-lock"></i> Account Security</h2>

                    <div class="form-group">
                        <label for="password">Password *</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Create a strong password" required />
                            <button type="button" class="password-toggle" data-target="password">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-hint">
                            <small>Must be at least 8 characters with uppercase, lowercase, and a number</small>
                        </div>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password *</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Confirm your password" required />
                            <button type="button" class="password-toggle" data-target="confirmPassword">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <div class="error-message" id="confirmPasswordError"></div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="terms">
                        <input type="checkbox" id="terms" required />
                        <label for="terms">
                            I confirm that the information provided is accurate and I agree to the
                            <a href="#" onclick="return false;">Terms and Conditions</a>
                        </label>
                        <div class="error-message" id="termsError"></div>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="fa-solid fa-paper-plane"></i>
                    Submit Application
                </button>

                <p class="login-link">
                    Already have an account? <a href="login.html">Login here</a>
                </p>
            </form>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="api-config.js"></script>
    <script src="lecturer-apply.js"></script>
</body>
</html>
