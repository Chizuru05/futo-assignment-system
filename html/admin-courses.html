<!DOCTYPE html>
<html lang="en">
<head>    <script src="api-config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTO Admin · Courses</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-courses.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>FUTO Admin</span>
            </div>
            <nav>
                <a href="admin-dashboard.html" class="nav-item">
                    <i class="fa-solid fa-chart-pie"></i> Dashboard
                </a>
                <a href="admin-courses.html" class="nav-item active">
                    <i class="fa-solid fa-book"></i> Courses
                </a>
                <a href="admin-students.html" class="nav-item">
                    <i class="fa-solid fa-users"></i> Students
                </a>
                <a href="admin-lecturers.html" class="nav-item">
                    <i class="fa-solid fa-chalkboard-user"></i> Lecturers
                </a>
                <a href="admin-submissions.html" class="nav-item">
                    <i class="fa-solid fa-file-export"></i> Submissions
                </a>
            </nav>
            <div style="margin-top: auto; padding-top: 2rem;">
                <a href="#" onclick="logout()" class="nav-item">
                    <i class="fa-solid fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Manage Courses</h1>
                <button class="btn-primary" onclick="openAddModal()">
                    <i class="fa-solid fa-plus"></i> Add Course
                </button>
            </div>
            
            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalCourses">0</div>
                    <div class="stat-label">Total Courses</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="harmattanCourses">0</div>
                    <div class="stat-label">Harmattan</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="rainCourses">0</div>
                    <div class="stat-label">Rain</div>
                </div>
            </div>
            
            <!-- Action Bar with Filters -->
            <div class="action-bar">
                <div class="filter-group">
                    <label>Semester:</label>
                    <select id="semesterFilter">
                        <option value="all">All Semesters</option>
                        <option value="Harmattan">Harmattan</option>
                        <option value="Rain">Rain</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Level:</label>
                    <select id="levelFilter">
                        <option value="all">All Levels</option>
                        <option value="100">100 Level</option>
                        <option value="200">200 Level</option>
                        <option value="300">300 Level</option>
                        <option value="400">400 Level</option>
                        <option value="500">500 Level</option>
                    </select>
                </div>
                <button class="btn-secondary" onclick="clearFilters()">
                    <i class="fa-solid fa-times"></i> Clear Filters
                </button>
            </div>
            
            <!-- Courses Table -->
            <div class="table-container">
                <table class="courses-table">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Title</th>
                            <th>Level</th>
                            <th>Semester</th>
                            <th>Credits</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="coursesTableBody">
                        <tr><td colspan="6" class="loading">Loading courses...</td</tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <!-- Add/Edit Course Modal -->
    <div class="modal" id="courseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Course</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Course Code <span class="required">*</span></label>
                    <input type="text" id="courseCode" placeholder="e.g., IFT501" maxlength="10">
                </div>
                <div class="form-group">
                    <label>Course Title <span class="required">*</span></label>
                    <input type="text" id="courseTitle" placeholder="e.g., Cyber Security and Networks">
                </div>
                <div class="form-group">
                    <label>Level <span class="required">*</span></label>
                    <select id="courseLevel">
                        <option value="100">100 Level</option>
                        <option value="200">200 Level</option>
                        <option value="300">300 Level</option>
                        <option value="400">400 Level</option>
                        <option value="500">500 Level</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Semester <span class="required">*</span></label>
                    <div class="semester-options">
                        <label class="radio-label">
                            <input type="radio" name="semester" value="Harmattan" checked>
                            <span>Harmattan</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="semester" value="Rain">
                            <span>Rain</span>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Credits</label>
                    <input type="number" id="courseCredits" value="3" min="1" max="6">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" id="saveCourseBtn">Save Course</button>
            </div>
        </div>
    </div>
    
    <!-- Delete Confirmation Modal -->
    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Confirm Delete</h3>
                <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete <strong id="deleteCourseName"></strong>?</p>
                <p class="warning-text">This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeDeleteModal()">Cancel</button>
                <button class="btn-danger" id="confirmDeleteBtn">Delete Course</button>
            </div>
        </div>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>
    
    <script src="admin-courses.js"></script>
</body>
</html>
