<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Department · Login</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- External CSS -->
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <!-- Login Form Panel -->
        <div class="form-panel">
            <div class="form-wrapper">
                <!-- Header -->
                <div class="form-header">
                    <div class="logo">
                        <i class="fa-solid fa-graduation-cap"></i>
                        <span>FUTO</span>
                    </div>
                    <h2>Welcome Back</h2>
                    <p>Department of Information Technology</p>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="login-form">
                    <!-- Role Selector (Optional - can be removed if you want direct student login) -->
                    <div class="role-selector">
                        <button type="button" class="role-btn active" id="studentRoleBtn">
                            <i class="fa-regular fa-user"></i>
                            <span>Student</span>
                        </button>
                        <button type="button" class="role-btn" id="lecturerRoleBtn">
                            <i class="fa-regular fa-chalkboard-user"></i>
                            <span>Lecturer</span>
                        </button>
                    </div>

                    <!-- Matric Number / Staff ID -->
                    <div class="input-field">
                        <label for="username">
                            <i class="fa-regular fa-id-card"></i>
                            <span id="usernameLabel">Matric Number</span> <span class="required">*</span>
                        </label>
                        <input type="text" id="username" placeholder="e.g., 2024/IT/001" autofocus>
                        <div class="input-hint" id="usernameHint">Enter your matric number</div>
                        <div class="error-message" id="usernameError"></div>
                    </div>

                    <!-- Password -->
                    <div class="input-field">
                        <label for="password">
                            <i class="fa-solid fa-lock"></i>
                            Password <span class="required">*</span>
                        </label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Enter your password">
                            <button type="button" class="password-toggle" id="passwordToggle">
                                <i class="fa-regular fa-eye"></i>
                            </button>
                        </div>
                        <div class="error-message" id="passwordError"></div>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="rememberMe">
                            <span class="checkmark"></span>
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link" id="forgotPassword">Forgot Password?</a>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="login-btn" id="loginBtn">
                        <span>Login</span>
                        <i class="fa-regular fa-arrow-right-to-bracket"></i>
                    </button>

                    <!-- Sign Up Link -->
                    <div class="signup-link">
                        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
                    </div>
                </form>

                <!-- Lecturer Login Hint (shown when lecturer role is selected) -->
                <div class="lecturer-hint" id="lecturerHint" style="display: none;">
                    <i class="fa-regular fa-circle-info"></i>
                    
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="login.js"></script>
</body>
</html>
